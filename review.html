<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>口コミのご協力のお願い</title>
<style>
  :root{ --blue:#007cba; --blue-d:#005a87; --bg:#f4f7fa; --text:#223; --sub:#667; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{ font-family:'Hiragino Sans','Hiragino Kaku Gothic ProN',sans-serif; background:var(--bg); color:var(--text); line-height:1.7; }
  .wrap{ max-width:560px; margin:0 auto; padding:24px 18px 60px; }
  .head{ text-align:center; padding:28px 16px; background:linear-gradient(135deg,var(--blue-d),var(--blue)); color:#fff; border-radius:16px; margin-bottom:22px; }
  .head h1{ font-size:22px; font-weight:800; margin-bottom:8px; }
  .head p{ font-size:14px; opacity:.95; }
  .store{ font-size:16px; font-weight:700; margin-top:10px; }
  .card{ background:#fff; border-radius:14px; padding:22px 18px; margin-bottom:18px; box-shadow:0 2px 10px rgba(0,0,0,.05); }
  .step{ font-size:13px; font-weight:800; color:var(--blue); margin-bottom:6px; }
  .card h2{ font-size:17px; font-weight:800; margin-bottom:14px; }
  .chips{ display:flex; flex-wrap:wrap; gap:10px; }
  .chip{ border:1.5px solid #cdd9e3; background:#fff; color:var(--text); border-radius:999px; padding:9px 16px; font-size:14px; cursor:pointer; user-select:none; transition:.15s; }
  .chip.on{ background:var(--blue); border-color:var(--blue); color:#fff; }
  .free{ width:100%; margin-top:14px; border:1.5px solid #cdd9e3; border-radius:10px; padding:11px 14px; font-size:15px; font-family:inherit; }
  .btn{ display:block; width:100%; border:none; border-radius:11px; padding:16px; font-size:16px; font-weight:800; cursor:pointer; transition:.15s; }
  .btn-primary{ background:var(--blue); color:#fff; box-shadow:0 6px 16px rgba(0,124,186,.3); }
  .btn-primary:disabled{ opacity:.5; box-shadow:none; cursor:not-allowed; }
  .btn-google{ background:#fff; color:var(--blue); border:2px solid var(--blue); }
  .btn-ghost{ background:#eef2f5; color:var(--sub); margin-top:10px; }
  .draft{ background:#f7fafc; border:1px solid #dde6ee; border-radius:12px; padding:16px; font-size:15px; line-height:1.9; white-space:pre-wrap; margin:12px 0; }
  .note{ font-size:12.5px; color:var(--sub); margin-top:10px; }
  .consent{ display:flex; gap:10px; align-items:flex-start; background:#fff7e6; border:1px solid #f0d488; border-radius:10px; padding:14px; margin:14px 0; font-size:13.5px; }
  .consent input{ margin-top:3px; width:18px; height:18px; flex:none; }
  .hidden{ display:none; }
  .loading{ text-align:center; color:var(--sub); padding:20px; }
  .spin{ width:26px; height:26px; border:3px solid #dde; border-top-color:var(--blue); border-radius:50%; animation:s 1s linear infinite; margin:0 auto 10px; }
  @keyframes s{ to{ transform:rotate(360deg); } }
  .thanks{ text-align:center; padding:30px 16px; }
  .thanks .big{ font-size:46px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <h1>口コミのご協力のお願い</h1>
    <p>本日はご来店ありがとうございました。<br>よろしければ、感想をお聞かせください。</p>
    <div class="store" id="storeName">　</div>
  </div>

  <!-- STEP1: 良かった点を選ぶ -->
  <div class="card" id="step1">
    <div class="step">STEP 1</div>
    <h2>良かった点を選んでください（複数可）</h2>
    <div class="chips" id="chips"></div>
    <input class="free" id="freeWord" type="text" placeholder="その他、感じたこと（任意）">
    <button class="btn btn-primary" id="genBtn" style="margin-top:18px" disabled>口コミの下書きを作る</button>
    <p class="note">※選んだ言葉をもとに、文章のたたき台を作成します。</p>
  </div>

  <!-- STEP2: 下書き確認・同意 -->
  <div class="card hidden" id="step2">
    <div class="step">STEP 2</div>
    <h2>下書きができました</h2>
    <div class="loading hidden" id="genLoading"><div class="spin"></div>作成中…</div>
    <div id="draftArea">
      <textarea class="draft" id="draftText" rows="6"></textarea>
      <p class="note">※自由に修正できます。ご自身の言葉に直していただいて構いません。</p>

      <div class="consent">
        <input type="checkbox" id="consent">
        <label for="consent">この内容（または修正したもの）を、自分の口コミとしてGoogleに投稿することに同意します。投稿は私自身が行うこと、店舗からの強制ではないことを理解しています。</label>
      </div>

      <button class="btn btn-google" id="copyBtn" disabled>コピーしてGoogleの投稿画面へ進む</button>
      <button class="btn btn-ghost" id="regenBtn">別の文章を作り直す</button>
    </div>
  </div>

  <!-- STEP3: 完了 -->
  <div class="card hidden" id="step3">
    <div class="thanks">
      <div class="big">🙏</div>
      <h2 style="margin:10px 0">ありがとうございます！</h2>
      <p style="color:var(--sub);font-size:14px">下書きをコピーしました。<br>Googleの投稿画面で貼り付けて投稿してください。</p>
      <button class="btn btn-google" id="openGoogle" style="margin-top:20px">Googleの口コミ投稿を開く</button>
    </div>
  </div>
</div>

<script>
const params = new URLSearchParams(location.search);
const STORE_ID = params.get('store') || '';
const STORE_NAME = params.get('name') || '当店';
const PLACE_URL = params.get('g') || ''; // Googleの口コミ投稿URL（任意）

document.getElementById('storeName').textContent = STORE_NAME;

// 良かった点の候補（業種に依存しない汎用）
const PRESETS = ['スタッフが丁寧','雰囲気が良い','また来たい','説明が分かりやすい','清潔感がある','対応が早い','コスパが良い','おすすめしたい','満足できた','相談しやすい'];
const selected = new Set();
const chipsEl = document.getElementById('chips');
PRESETS.forEach(w => {
  const b = document.createElement('div');
  b.className = 'chip'; b.textContent = w;
  b.onclick = () => { b.classList.toggle('on'); b.classList.contains('on') ? selected.add(w) : selected.delete(w); updateGenBtn(); };
  chipsEl.appendChild(b);
});
const freeEl = document.getElementById('freeWord');
freeEl.oninput = updateGenBtn;
function words(){ const arr=[...selected]; const f=freeEl.value.trim(); if(f) arr.push(f); return arr; }
function updateGenBtn(){ document.getElementById('genBtn').disabled = words().length === 0; }

document.getElementById('genBtn').onclick = generate;
document.getElementById('regenBtn').onclick = generate;

async function generate(){
  document.getElementById('step1').classList.add('hidden');
  document.getElementById('step2').classList.remove('hidden');
  document.getElementById('draftArea').style.display = 'none';
  document.getElementById('genLoading').classList.remove('hidden');
  document.getElementById('consent').checked = false;
  document.getElementById('copyBtn').disabled = true;
  try {
    const res = await fetch('/api/generate-content', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ locationId: STORE_ID, type:'review_draft', words: words() })
    });
    const data = await res.json();
    document.getElementById('genLoading').classList.add('hidden');
    document.getElementById('draftArea').style.display = '';
    document.getElementById('draftText').value = data.content || '（生成できませんでした。もう一度お試しください）';
  } catch(e){
    document.getElementById('genLoading').classList.add('hidden');
    document.getElementById('draftArea').style.display = '';
    document.getElementById('draftText').value = '通信エラーが発生しました。もう一度お試しください。';
  }
}

document.getElementById('consent').onchange = (e) => {
  document.getElementById('copyBtn').disabled = !e.target.checked;
};

document.getElementById('copyBtn').onclick = async () => {
  const text = document.getElementById('draftText').value;
  try { await navigator.clipboard.writeText(text); } catch(e){}
  document.getElementById('step2').classList.add('hidden');
  document.getElementById('step3').classList.remove('hidden');
};

document.getElementById('openGoogle').onclick = () => {
  const url = PLACE_URL || `https://search.google.com/local/writereview?placeid=`;
  window.open(url, '_blank');
};
</script>
</body>
</html>
